 <svg xmlns="http://www.w3.org/2000/svg" 
     width="60" height="60" viewBox="0 0 200 200">
  <!-- Círculo exterior (vinilo negro) -->
  <circle cx="100" cy="100" r="95" fill="black" />
  
  <!-- Surcos del vinilo (líneas grises concéntricas) -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="gray" stroke-width="1"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="gray" stroke-width="1"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="gray" stroke-width="1"/>
  
  <!-- Etiqueta central (naranja) -->
  <circle cx="100" cy="100" r="25" fill="orange" />
  
  <!-- Agujero central (amarillo) -->
  <circle cx="100" cy="100" r="5" fill="yellow" />
</svg>
